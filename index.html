<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <h1>Sorting visualizer</h1>
        <div class="array" id="array">
            
        </div>
        <button type="button" id="generate-array">Generate array</button>
        <h2>Select algorithm</h2>
        <div class="algorithms">
            <button type="button" id="bubble-sort">Bubble</button>
            <button type="button" id="selection-sort">Selection</button>
            <button type="button" id="insertion-sort">Insertion</button>
            <button type="button" id="merge-sort">Merge</button>
            <button type="button" id="quick-sort">Quick</button>
        </div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
